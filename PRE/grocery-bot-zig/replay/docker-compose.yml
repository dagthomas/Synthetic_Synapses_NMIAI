services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: grocery_bot
      POSTGRES_USER: grocery
      POSTGRES_PASSWORD: grocery123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grocery -d grocery_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "5173:3000"
    environment:
      DATABASE_URL: postgres://grocery:grocery123@db:5432/grocery_bot
      ORIGIN: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
